import streamlit as st
import requests
from shapely.geometry import shape
from shapely.ops import transform
import pyproj
import folium
from streamlit_folium import st_folium

# VWorld API Key
VWORLD_API_KEY = "A070CA95-CB44-3EE4-B080-91186F311F96"

st.title("📍 주소 기반 지적경계 추출기")
address = st.text_input("주소를 입력하세요:", "서울특별시 종로구 사직동 9")

# 주소 → 좌표 변환 (VWorld 사용)
def geocode_address(address):
    url = f"http://api.vworld.kr/req/address?service=address&request=getcoord&format=json&crs=EPSG:4326&key={VWORLD_API_KEY}&address={address}"
    res = requests.get(url).json()
    try:
        x = float(res['response']['result']['point']['x'])
        y = float(res['response']['result']['point']['y'])
        pnu = res['response']['refined']['structure']['level4LC']
        return x, y, pnu
    except Exception as e:
        st.error("주소 변환 실패: " + str(e))
        return None, None, None

# PNU 코드로 지적 경계 추출
def get_parcel_polygon(pnu):
    url = f"http://api.vworld.kr/req/data?service=data&request=getfeature&key={VWORLD_API_KEY}&domain=1&format=json&table=LT_C_ADSIDO_INFO&geomfilter=POINT({x} {y})"
    try:
        url = f"http://api.vworld.kr/req/data?service=data&version=2.0&request=getfeature&format=json&type=parcel&key={VWORLD_API_KEY}&size=1&geometry=true&attrFilter=pnu:EQ:{pnu}"
        res = requests.get(url).json()
        coords = res['response']['result']['featureCollection']['features'][0]['geometry']
        return shape(coords)
    except Exception as e:
        st.error("지적 경계 추출 실패: " + str(e))
        return None

# 시각화 함수
def visualize_polygon(geom, x, y):
    m = folium.Map(location=[y, x], zoom_start=18)
    folium.GeoJson(geom).add_to(m)
    folium.Marker([y, x], popup="입력한 주소").add_to(m)
    return m

if st.button("지적경계 추출"):
    x, y, pnu = geocode_address(address)
    if x and y and pnu:
        st.success(f"좌표: {x}, {y} | PNU: {pnu}")
        polygon_geom = get_parcel_polygon(pnu)
        if polygon_geom:
            folium_map = visualize_polygon(polygon_geom, y, x)
            st_folium(folium_map, width=700, height=500)
